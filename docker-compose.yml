services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academico-filament-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${APP_PORT:-8080}:80"
      - "${APP_HTTPS_PORT:-8443}:443"
    volumes:
      - ./.env:/app/.env
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - academico-network
    environment:
      SERVER_NAME: ":80"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      DB_CONNECTION: "${DB_CONNECTION:-mariadb}"
      DB_HOST: "${DB_HOST:-mariadb}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE:-academico_filament}"
      DB_USERNAME: "${DB_USERNAME:-academico}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    container_name: academico-filament-mariadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-3306}:3306"
    environment:
      MARIADB_DATABASE: "${DB_DATABASE:-academico_filament}"
      MARIADB_USER: "${DB_USERNAME:-academico}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-secret}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret}"
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - academico-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  academico-network:
    driver: bridge

volumes:
  mariadb-data:
    driver: local
